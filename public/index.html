<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双色球核对器（官方20期 + 自定义号码）</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1>福彩双色球 · 5组号码自动核对器</h1>

    <!-- 开关：使用自定义开奖号码 -->
    <label class="custom-toggle">
      <input type="checkbox" id="useCustom" />
      <span>✅ 启用自定义开奖号码（手动填写）</span>
    </label>

    <!-- 最近20期下拉框 -->
    <fieldset>
      <legend>选择最近 20 期官方开奖</legend>
      <div class="row">
        <label for="comboDraws">开奖期：</label>
        <select id="comboDraws" style="min-width:320px;"></select>
        <button id="btnRefresh" class="btn-secondary" type="button">🔄 刷新</button>
      </div>
    </fieldset>

    <!-- 开奖号码 -->
    <fieldset>
      <legend>开奖号码</legend>
      <div class="row">
        <label for="winRed">红球：</label>
        <input type="text" id="winRed" placeholder="如 1 2 3 4 5 6" style="width:240px;" readonly />
        <label for="winBlue">蓝球：</label>
        <input type="text" id="winBlue" placeholder="如 8" style="width:70px;" readonly />
      </div>
    </fieldset>

    <!-- 5组自选号码 -->
    <fieldset>
      <legend>5 组自选号码（自动保存）</legend>
      <div id="userRows"></div>
    </fieldset>

    <button id="btnCheck" class="btn-primary" type="button">✅ 提交核对</button>

    <!-- 中奖结果 -->
    <fieldset>
      <legend>中奖结果</legend>
      <div id="result" class="result"></div>
    </fieldset>

    <p class="hint">中奖规则：6红+1蓝=一等奖(1000万)｜6红=二等奖(500万)｜5红+1蓝=三等奖(3000)｜
      5红 或 4红+1蓝=四等奖(200)｜4红 或 3红+1蓝=五等奖(10)｜≤2红+1蓝=六等奖(5)｜3红=福运奖(5)</p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
